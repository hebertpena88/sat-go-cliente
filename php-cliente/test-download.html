<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Descarga XML</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Prueba de Descarga XML</h2>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="testDownload()">Probar Descarga</button>
                <button class="btn btn-success ms-2" onclick="testView()">Probar Visualización</button>
                
                <div style="margin-top: 20px;">
                    <h4>Badges de prueba:</h4>
                    <span class="badge badge-success">Vigente</span>
                    <span class="has-content-badge" title="XML disponible">✓ XML</span>
                    
                    <div style="margin-top: 15px;">
                        <p><strong>Estado del Modal:</strong> <span id="modalStatus">Cerrado</span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de Visualización XML -->
        <div class="xml-modal-backdrop" id="xmlModal">
            <div class="xml-modal">
                <div class="xml-modal-header">
                    <h3 id="xmlModalTitle">Contenido XML</h3>
                    <button class="modal-close" onclick="closeXMLModal()">&times;</button>
                </div>
                <div class="xml-modal-body">
                    <pre class="xml-content" id="xmlModalContent"></pre>
                </div>
                <div class="xml-modal-footer">
                    <button class="btn btn-secondary" onclick="closeXMLModal()">Cerrar</button>
                    <button class="btn btn-success" id="xmlModalDownloadBtn">
                        <span class="download-icon">⬇</span> Descargar XML
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Generated by Copilot
        // XML de prueba en base64 (un XML simple)
        const testXMLBase64 = btoa('<?xml version="1.0" encoding="UTF-8"?>\n<factura>\n  <emisor>\n    <rfc>PESH8805072Q5</rfc>\n    <nombre>HEBERT RICARDO PEÑA SERNA</nombre>\n  </emisor>\n  <receptor>\n    <rfc>ECE0802257VA</rfc>\n    <nombre>EDITORIAL CEGA</nombre>\n  </receptor>\n  <total>49960.03</total>\n  <uuid>4BB322C8-5810-4A38-91AB-7B9D3D0D14FE</uuid>\n</factura>');

        function testDownload() {
            try {
                const xmlContent = atob(testXMLBase64);
                const blob = new Blob([xmlContent], { type: 'application/xml;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'factura_test.xml';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                alert('Descarga iniciada: ' + a.download);
            } catch (error) {
                console.error('Error:', error);
                alert('Error al descargar: ' + error.message);
            }
        }

        function testView() {
            try {
                const xmlContent = atob(testXMLBase64);
                document.getElementById('xmlModalTitle').textContent = 'factura_test.xml';
                document.getElementById('xmlModalContent').textContent = xmlContent;
                document.getElementById('xmlModalDownloadBtn').onclick = testDownload;
                document.getElementById('xmlModal').classList.add('show');
                document.getElementById('modalStatus').textContent = 'Abierto';
                console.log('Modal abierto');
            } catch (error) {
                console.error('Error:', error);
                alert('Error al visualizar: ' + error.message);
            }
        }

        function closeXMLModal() {
            document.getElementById('xmlModal').classList.remove('show');
            document.getElementById('modalStatus').textContent = 'Cerrado';
            console.log('Modal cerrado');
        }

        // Cerrar modal al hacer clic fuera
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('xmlModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeXMLModal();
                }
            });
        });
    </script>
</body>
</html>
